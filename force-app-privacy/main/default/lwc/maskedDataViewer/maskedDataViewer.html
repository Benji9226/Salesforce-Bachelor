<template>
    <lightning-card title="Masked Data Viewer" icon-name="standard:shield">
        <div slot="actions">
            <lightning-button
                label="Export Masked CSV"
                icon-name="utility:download"
                onclick={handleExportCsv}
                variant="brand"
                disabled={noData}>
            </lightning-button>
        </div>

        <div class="slds-p-horizontal_medium">
            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                {subtitle}
            </p>

            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <p>Error loading data: {error}</p>
                </div>
            </template>

            <template if:true={hasData}>
                <lightning-datatable
                    key-field="id"
                    data={contacts}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column>
                </lightning-datatable>
            </template>

            <template if:false={hasData}>
                <template if:false={error}>
                    <div class="slds-align_absolute-center slds-p-around_large">
                        <lightning-spinner alternative-text="Loading"></lightning-spinner>
                    </div>
                </template>
            </template>
        </div>
        <a data-id="downloadLink" style="display:none"></a>
    </lightning-card>
</template>
